<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Repair</title>
</head>

<body>

<iframe id="formframe" src="" frameborder="0" style="width:100%;height:100vh;"></iframe>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

function runApp(){

liff.getProfile().then(profile => {

let userId = profile.userId;
let displayName = profile.displayName;
let pictureUrl = profile.pictureUrl;

let url = "form.html?userId="+userId+
"&displayName="+displayName+
"&pictureUrl="+pictureUrl;

document.getElementById("formframe").src = url;

});

}

liff.init({ liffId:"2009390223-MxME94q7" }, () => {

if(liff.isLoggedIn()){
runApp();
}else{
liff.login();
}

});

</script>

</body>
</html>
