<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>แจ้งซ่อม</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
background:#4CAF50;
color:white;
border:none;
margin-top:10px;
}

</style>

</head>

<body>

<h2>ระบบแจ้งซ่อม Online</h2>

<label>เรื่องที่แจ้ง</label>
<textarea id="request"></textarea>

<label>ผู้แจ้ง</label>
<input type="text" id="displayName" readonly>

<button onclick="save()">ส่งข้อความ</button>

<script>

let params = new URLSearchParams(window.location.search);

let userId = params.get("userId");
let displayName = params.get("displayName");
let pictureUrl = params.get("pictureUrl");

document.getElementById("displayName").value = displayName;

function save(){

let request = document.getElementById("request").value;

fetch("https://script.google.com/macros/s/AKfycbyTxYZ29Z6VpRR9YJmTqeEH6ybUfsdXmdHTR7leMgN1AFAu21Xp0_cDCiMg7D-IFF7aqA/exec",{
method:"POST",
body: JSON.stringify({
userId:userId,
displayName:displayName,
pictureUrl:pictureUrl,
request:request
})
});

alert("บันทึกแล้ว");

}

</script>

</body>
</html>
